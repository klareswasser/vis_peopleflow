<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>都道府県間 人口移動 円環 2010-2025</title>
<meta name="viewport" content="width=device-width,initial-scale=1">
<style>
  :root{
    --bg:#07080d; --bg2:#11131c; --line:#1d1f2a;
    --fg:#e8e9ef; --mute:#7a7d8a; --dim:#4a4d5a;
    --pos:#ff5b86; --pos-d:#ff8aab; --neg:#3ecbff; --neg-d:#86dfff;
    --accent:#ffd34d;
  }
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{height:100%}
  body{
    background:radial-gradient(ellipse at 50% 40%, #14172a 0%, #07080d 70%);
    color:var(--fg);
    font-family:'Hiragino Sans','Inter','Helvetica Neue',sans-serif;
    overflow:hidden;
    letter-spacing:.02em;
  }
  #app{display:grid;grid-template-columns:1fr 320px;height:100vh;width:100vw}
  #stage{position:relative;overflow:hidden}
  #panel{
    background:rgba(11,13,22,.85);
    border-left:1px solid var(--line);
    padding:18px 18px 14px;
    display:flex;flex-direction:column;gap:10px;
    backdrop-filter:blur(8px);
    overflow-y:auto;
  }
  /* ── タイトル & 凡例 ── */
  .title{font-size:1.05rem;font-weight:600;letter-spacing:.08em;color:#fff}
  .sub{font-size:.7rem;color:var(--mute);line-height:1.6}
  .legend{display:flex;flex-direction:column;gap:4px;font-size:.7rem;color:var(--mute)}
  .legend .row{display:flex;align-items:center;gap:8px}
  .swatch{width:22px;height:8px;border-radius:2px}
  .swatch.pos{background:linear-gradient(90deg,rgba(255,91,134,.2),var(--pos))}
  .swatch.neg{background:linear-gradient(90deg,rgba(62,203,255,.2),var(--neg))}
  .swatch.line{background:linear-gradient(90deg,transparent,rgba(255,255,255,.35),transparent);height:2px;margin:3px 0}
  /* ── スライダー ── */
  #controls{
    position:absolute;left:50%;bottom:18px;transform:translateX(-50%);
    background:rgba(11,13,22,.75);
    border:1px solid var(--line);
    border-radius:30px;
    padding:10px 22px;
    display:flex;align-items:center;gap:14px;
    backdrop-filter:blur(8px);
    z-index:5;
  }
  #year-display{display:none}
  #slider{
    -webkit-appearance:none;appearance:none;
    width:280px;height:4px;background:#222633;border-radius:2px;outline:none;cursor:pointer;
  }
  #slider::-webkit-slider-thumb{
    -webkit-appearance:none;width:14px;height:14px;border-radius:50%;
    background:var(--accent);box-shadow:0 0 12px var(--accent);cursor:pointer;
  }
  #slider::-moz-range-thumb{width:14px;height:14px;border-radius:50%;background:var(--accent);border:none;cursor:pointer}
  .btn{
    background:none;border:1px solid var(--line);color:var(--fg);
    width:32px;height:32px;border-radius:50%;cursor:pointer;
    display:flex;align-items:center;justify-content:center;font-size:.85rem;
    transition:.15s;
  }
  .btn:hover{background:rgba(255,255,255,.08);border-color:var(--accent)}
  .btn.playing{background:var(--accent);color:#000;border-color:var(--accent)}
  /* ── 中央ロゴ ── */
  .center-cap{
    font-size:.65rem;fill:var(--mute);text-anchor:middle;
    letter-spacing:.4em;
  }
  /* ── SVG ── */
  svg.main{width:100%;height:100%;display:block}
  .arc-bg{fill:rgba(255,255,255,.04)}
  .arc-tick{stroke:rgba(255,255,255,.08);stroke-width:1}
  /* ── 地方区分 ── */
  .region-band{stroke:none;opacity:.55;transition:opacity .25s}
  .region-band-inner{fill:none;stroke:rgba(255,255,255,.12);stroke-width:.6}
  .region-divider{stroke:rgba(255,255,255,.18);stroke-width:.8;stroke-linecap:round}
  .region-arc{fill:none;stroke:none}
  .region-label{
    font-size:13px;font-weight:500;
    letter-spacing:.9em;
    text-anchor:middle;
    paint-order:stroke;
    stroke:#07080d;stroke-width:3;stroke-linejoin:round;
  }
  .node-label.tinted{opacity:.92}
  .node{cursor:pointer}
  .node-bar{transition:filter .2s}
  .node:hover .node-bar{filter:brightness(1.3) drop-shadow(0 0 6px currentColor)}
  .node-label{font-size:9.5px;fill:#cdd0d8;letter-spacing:.04em;pointer-events:none;transition:.2s}
  .node.dim .node-label{fill:var(--dim)}
  .node.dim .node-bar{opacity:.25}
  .node.hilite .node-label{fill:#fff;font-weight:600;font-size:11px}
  .flow{fill:none;mix-blend-mode:screen;pointer-events:none;transition:opacity .25s,stroke-width .25s;stroke-linecap:round}
  /* ── 流れアニメーション ──
     dasharray = (実線 6, 隔 18) を -24 ずつシフトして origin→destに流す
  */
  @keyframes flow-dash{
    from { stroke-dashoffset: 0; }
    to   { stroke-dashoffset: -24; }
  }
  .flow.anim{
    stroke-dasharray: 6 18;
    animation: flow-dash 1.6s linear infinite;
  }
  .flow.anim.fast{ animation-duration:.9s; }
  /* ホバー中のハイライトフローは多めのダッシュと逆方向にしてレイヤーを達する
     “逆方向」のオフセットアニメを使うと origin→dest に見える */

  /* ── モード切替 ── */
  .mode-toggle{display:flex;border:1px solid var(--line);border-radius:20px;overflow:hidden;background:rgba(0,0,0,.3)}
  .mode-toggle button{background:none;border:none;color:var(--mute);padding:6px 14px;font-size:.7rem;letter-spacing:.1em;cursor:pointer;transition:.15s;font-family:inherit}
  .mode-toggle button.active{background:var(--accent);color:#000;font-weight:600}
  .mode-toggle button:not(.active):hover{color:#fff;background:rgba(255,255,255,.06)}
  /* ── 詳細パネル ── */
  .stat-box{
    background:rgba(255,255,255,.025);
    border:1px solid var(--line);
    border-radius:10px;
    padding:14px 16px;
  }
  .stat-name{font-size:1.4rem;font-weight:300;color:#fff;margin-bottom:2px}
  .stat-region{font-size:.65rem;color:var(--mute);letter-spacing:.2em}
  .net-big{
    font-family:'Helvetica Neue',monospace;
    font-size:1.6rem;font-weight:400;margin-top:10px;letter-spacing:.04em;
  }
  .net-big.pos{color:var(--pos)}
  .net-big.neg{color:var(--neg)}
  .net-cap{font-size:.6rem;color:var(--mute);letter-spacing:.2em;margin-top:-2px}
  .io-row{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:10px}
  .io-cell{background:rgba(0,0,0,.25);padding:6px 8px;border-radius:6px;text-align:center}
  .io-cap{font-size:.6rem;color:var(--mute);margin-bottom:2px}
  .io-val{font-family:monospace;font-size:.9rem}
  .io-val.pos{color:var(--pos-d)}
  .io-val.neg{color:var(--neg-d)}
  .flow-section{flex:1;min-height:0;display:flex;flex-direction:column;gap:6px}
  .flow-section h4{
    font-size:.65rem;color:var(--mute);letter-spacing:.15em;
    display:flex;justify-content:space-between;padding-bottom:3px;
    border-bottom:1px solid var(--line);
  }
  .flow-section h4.pos{color:var(--pos-d)}
  .flow-section h4.neg{color:var(--neg-d)}
  .flow-list{display:flex;flex-direction:column;gap:2px;max-height:160px;overflow-y:auto}
  .flow-list::-webkit-scrollbar{width:3px}
  .flow-list::-webkit-scrollbar-thumb{background:#2a2d3a;border-radius:2px}
  .flow-row{position:relative;font-size:.72rem;padding:4px 8px;border-radius:4px;overflow:hidden;cursor:default}
  .flow-row .bar{position:absolute;left:0;top:0;bottom:0;opacity:.25}
  .flow-row .bar.pos{background:var(--pos)}
  .flow-row .bar.neg{background:var(--neg)}
  .flow-row .content{position:relative;display:flex;justify-content:space-between;align-items:center}
  .flow-row .v{font-family:monospace;color:#e0e0e0}
  .placeholder{
    flex:1;display:flex;align-items:center;justify-content:center;text-align:center;
    color:var(--dim);font-size:.72rem;line-height:1.8;border:1px dashed var(--line);
    border-radius:10px;padding:20px 14px;
  }
  /* スマホ用ヘッダー（PCでは非表示） */
  #mobile-header{display:none}
  /* レスポンシブ */
  @media (max-width:900px){
    body{overflow:auto}
    #app{grid-template-columns:1fr;grid-template-rows:auto auto auto;height:auto;min-height:100vh}
    #mobile-header{
      display:block;
      background:linear-gradient(180deg,rgba(20,23,42,.92),rgba(11,13,22,.82));
      border-bottom:1px solid var(--line);
      padding:14px 18px 12px;
      backdrop-filter:blur(8px);
      position:sticky;top:0;z-index:10;
    }
    #mobile-header h1{
      font-size:1.02rem;font-weight:600;letter-spacing:.08em;color:#fff;
      margin:0 0 4px;line-height:1.3;
    }
    #mobile-header .mh-sub{
      font-size:.66rem;color:var(--mute);letter-spacing:.06em;line-height:1.5;
    }
    #mobile-header .mh-sub b{color:#fff;font-weight:600}
    #stage{height:100vw;min-height:0;aspect-ratio:1/1;padding:0}
    #stage svg{width:100%;height:100%}
    #panel{max-height:none;border-left:none;border-top:1px solid var(--line);padding:16px 14px 14px;gap:10px}
    #panel > div:first-child{display:none} /* PC用タイトルをスマホでは隠す */
    .sub{font-size:.65rem}
    #controls{padding:8px 14px;gap:10px;bottom:10px}
    .flow-list{max-height:200px}
    .node-label{font-size:24px;letter-spacing:0;font-weight:500;pointer-events:auto;cursor:pointer}
    .node.hilite .node-label{font-size:27px}
    .region-label{display:none}
  }
  @media (max-width:480px){
    #stage{height:100vw;min-height:0}
    #mobile-header{padding:12px 14px 10px}
    #mobile-header h1{font-size:.95rem}
    #mobile-header .mh-sub{font-size:.62rem}
    .node-label{font-size:26px}
    .node.hilite .node-label{font-size:29px}
  }
</style>
</head>
<body>
<div id="app">
  <header id="mobile-header">
    <h1>都道府県間 人口移動 2010–2025</h1>
    <div class="mh-sub">住民基本台帳人口移動報告　外周バー＝<b>転入超過｜転出超過</b>の絶対値</div>
  </header>
  <div id="stage">
  <svg class="main" id="svg" viewBox="-500 -500 1000 1000" preserveAspectRatio="xMidYMid meet">
    <defs id="grad-defs"></defs>
  </svg>
    <div id="controls">
      <button class="btn" id="play" title="再生/停止" style="display:none">▶</button>
      <input type="range" id="slider" min="0" max="0" step="1" value="0" style="display:none">

      <div class="mode-toggle" id="mode-toggle" style="display:none">
        <button data-mode="net" class="active">純流動</button>
        <button data-mode="gross">総量</button>
      </div>

    </div>
  </div>
  <aside id="panel">
    <div>
      <div class="title">都道府県間人口移動</div>
      <div class="sub">住民基本台帳 2010–2025</div>
    </div>
    <div class="legend">
      <div class="row"><div class="swatch pos"></div>転入超過</div>
      <div class="row"><div class="swatch neg"></div>転出超過</div>
      <div class="row" style="color:var(--mute);margin-top:4px;font-size:.65rem">外周バー＝純転入出超の絶対値</div>
    </div>
    <div id="detail-host">
      <div class="placeholder">都道府県をホバーすると<br>詳細が表示されます</div>
    </div>
  </aside>
</div>

  let netMaxAbs=0;
  YEARS.forEach(y=>{
    data.years[y].net.forEach(v=>{ if(Math.abs(v)>netMaxAbs) netMaxAbs=Math.abs(v); });
  });
  const barH=v=>Math.sqrt(Math.abs(v)/netMaxAbs)*R_BAR_MAX;  // 平方根スケールで視認性UP

  // ── SVG 描画用グループ ──
  const gBgFlow=mk('g',{id:'bg-flow'});
  const gHiFlow=mk('g',{id:'hi-flow'});
  const gRegion=mk('g',{id:'regions'});
  const gNodes=mk('g',{id:'nodes'});
  const gCenter=mk('g',{id:'center'});
  svg.append(gBgFlow,gHiFlow,gRegion,gNodes,gCenter);

  // 地域帯（外周の色バンド）+ ラベル + 間仕切り
  const R_REG_IN  = R_INNER+R_BAR_MAX+(IS_MOBILE?155:58);   // 帯内側（pref ラベルより外）
  const R_REG_OUT = R_REG_IN+(IS_MOBILE?12:10);             // 帯外側
  const R_REG_LBL = R_REG_OUT+20;           // ラベル弧半径
  const R_DIV_IN  = R_INNER-2;              // 地域区切り内端
  const R_DIV_OUT = R_REG_OUT+4;            // 地域区切り外端

  regionBounds.forEach(reg=>{
    const a1=angles[reg.start].start - 0.3;
    const a2=angles[reg.end].end + 0.3;
    const color=REGION_COLORS[reg.name]||'#888';

    // 帯（フィルテッド）
    const band=mk('path',{
      class:'region-band',
      d:arcPath(R_REG_IN, R_REG_OUT, a1, a2),
      fill:color,
    });
    gRegion.append(band);

    // 帯の内側ストローク（をさやかな仕切り線）
    const innerArcId=`region-arc-in-${reg.name}`;
    const innerArc=mk('path',{
      class:'region-band-inner',
      d:arcPath(R_REG_IN-0.5,R_REG_IN-0.5,a1,a2),
      id:innerArcId,
    });
    gRegion.append(innerArc);

    // ラベル用弧（下半はテキストが上下反転するので逆方向・わずかに外側の弧にする）
    const labelArcId=`region-arc-lbl-${reg.name}`;
    const aMid=(a1+a2)/2;
    const bottom = aMid > 0 && aMid < 180;
    const large = (a2-a1) > 180 ? 1 : 0;
    let labelD;
    if(bottom){
      const r = R_REG_LBL + 16;
      const p1=xy(r,a2), p2=xy(r,a1);
      labelD = `M${p1.x.toFixed(1)},${p1.y.toFixed(1)} A${r},${r} 0 ${large} 0 ${p2.x.toFixed(1)},${p2.y.toFixed(1)}`;
    } else {
      const r = R_REG_LBL;
      const p1=xy(r,a1), p2=xy(r,a2);
      labelD = `M${p1.x.toFixed(1)},${p1.y.toFixed(1)} A${r},${r} 0 ${large} 1 ${p2.x.toFixed(1)},${p2.y.toFixed(1)}`;
    }
    const labelArc=mk('path',{class:'region-arc',d:labelD,id:labelArcId});
    gRegion.append(labelArc);

    const txt=mk('text',{class:'region-label',fill:color});
    if(!IS_MOBILE){
      const tp=mk('textPath',{href:`#${labelArcId}`,'startOffset':'50%'});
      tp.textContent=reg.name;
      txt.append(tp);
    }
    gRegion.append(txt);
  });

  // 地域間の径方向ディバイダー（連続地域間に出る見た目上の間仕切り）
  for(let k=0;k<regionBounds.length;k++){
    const cur=regionBounds[k];
    const next=regionBounds[(k+1)%regionBounds.length];
    // cur.end と next.start の間の中点角度
    const a=(angles[cur.end].end + (angles[next.start].start + (k===regionBounds.length-1?360:0)))/2;
    const p1=xy(R_DIV_IN,a), p2=xy(R_DIV_OUT,a);
    gRegion.append(mk('line',{
      class:'region-divider',
      x1:p1.x.toFixed(1),y1:p1.y.toFixed(1),
      x2:p2.x.toFixed(1),y2:p2.y.toFixed(1),
    }));
  }

  // ノード（外周バー）作成
  const nodes=[];
  for(let i=0;i<N;i++){
    const a=angles[i];
    const regColor = REGION_COLORS[regionMerged[PREFS[i]]] || '#888';
    const g=mk('g',{class:'node','data-i':i});
    // 背景の薄バー（地域色を薄く差し色）
    const bgPath=arcPath(R_INNER,R_INNER+4, a.start+0.3, a.end-0.3);
    g.append(mk('path',{d:bgPath,class:'arc-bg',fill:regColor,style:'opacity:.35'}));
    // 値バー（動的更新）
    const bar=mk('path',{class:'node-bar',d:''});
    g.append(bar);
    // ラベル
    const a0=a.center;
    const lp=xy(R_LABEL,a0);
    let rot=a0;
    let anchor='start';
    if(a0>90||a0<-90){ rot=a0+180; anchor='end'; }
    const lab=mk('text',{
      class:'node-label',
      x:lp.x,y:lp.y,
      'text-anchor':anchor,
      'dominant-baseline':'central',
      transform:`rotate(${rot} ${lp.x} ${lp.y})`,
    });
    lab.textContent=PREFS[i];
    g.append(lab);
    // ホバー領域（透明な太い弧）
    const hitPath=arcPath(R_INNER-2, R_INNER+R_BAR_MAX+12, a.start, a.end);
    const hit=mk('path',{d:hitPath,fill:'transparent',style:'cursor:pointer'});
    g.append(hit);
    g.addEventListener('mouseenter',()=>highlight(i));
    g.addEventListener('mouseleave',()=>{ if(!stickyHi) highlight(null); });
    g.addEventListener('click',(e)=>{ e.stopPropagation(); if(stickyHi===i){ stickyHi=null; highlight(null);} else { stickyHi=i; highlight(i);} });
    gNodes.append(g);
    nodes.push({g,bar,lab,bgPath});
  }

  // 中央テキスト（非表示）

  // 背景フロー（全フロー中、上位だけ薄く描画）— 動的差し替え
  let allBgPaths=[];
  let hiPaths=[];

  let MODE='net';   // 純流動のみ（総量モードは廃止）

  // ペアごとの純流動/総流動を計算
  function computePairFlows(yd){
    const m={};
    yd.flows.forEach(([o,d,v])=>{ m[o+'_'+d]=v; });
    const out=[];
    for(let i=0;i<N;i++){
      for(let j=i+1;j<N;j++){
        const a=m[i+'_'+j]||0, b=m[j+'_'+i]||0;
        if(a+b===0) continue;
        // 純流動は勝ち方向を1本、総量は2本ずつ
        const winner = a>=b ? {from:i,to:j,gross:a,net:a-b}
                            : {from:j,to:i,gross:b,net:b-a};
        out.push(winner);
      }
    }
    return out;
  }

  // ストローク幅を べき乗スケールで計算（p=指数、小さいほど差が圧縮される）
  function strokeW(v, maxV, lo, hi, p=1.0){
    if(v<=0) return lo;
    return lo + (hi-lo)*Math.pow(v/maxV, p);
  }

  function renderYear(year){
    const yd=data.years[year];
    if(yearDisp) yearDisp.firstChild.nodeValue=year;
    // バー更新
    for(let i=0;i<N;i++){
      const v=yd.net[i];
      const a=angles[i];
      const h=barH(v);
      const r2=R_INNER+h;
      const path=arcPath(R_INNER, r2, a.start+0.25, a.end-0.25);
      nodes[i].bar.setAttribute('d',path);
      const color=v>=0?'var(--pos)':'var(--neg)';
      nodes[i].bar.style.fill=color;
      nodes[i].bar.style.color=color;
    }
    // 背景フローは描画しない（ホバー時のみ）。grad-defs もクリア。
    gBgFlow.innerHTML='';
    gDefs.innerHTML='';
    gradSeq=0;
    if(currentHi!==null) highlight(currentHi,true);
    updateDetail();
  }

  // 弦曲線（OD方向あり：中心をオフセットしてよりそれとわかるカーブに）
  function chord(oi,di){
    if(oi===di) return '';
    const a1=angles[oi].center, a2=angles[di].center;
    const p1=xy(R_FLOW,a1), p2=xy(R_FLOW,a2);
    // 制御点は中点を原点方向へ引き寄せた点（適度に弦ばせる）
    const mx=(p1.x+p2.x)/2, my=(p1.y+p2.y)/2;
    return `M${p1.x.toFixed(1)},${p1.y.toFixed(1)} Q${(mx*0.25).toFixed(1)},${(my*0.25).toFixed(1)} ${p2.x.toFixed(1)},${p2.y.toFixed(1)}`;
  }

  // origin→dest のグラデーションを grad-defs に生成し、そのID(URL)を返す
  // colorHex: "#ff5b86" 等、alphaTo: 行先側の不透明度
  let gradSeq=0;
  const gDefs=document.getElementById('grad-defs');
  function makeGrad(oi,di,colorHex,alphaTo){
    const id='g'+(++gradSeq);
    const a1=angles[oi].center, a2=angles[di].center;
    const p1=xy(R_FLOW,a1), p2=xy(R_FLOW,a2);
    const g=mk('linearGradient',{
      id,
      gradientUnits:'userSpaceOnUse',
      x1:p1.x.toFixed(1), y1:p1.y.toFixed(1),
      x2:p2.x.toFixed(1), y2:p2.y.toFixed(1),
    });
    const s1=mk('stop',{offset:'0%','stop-color':colorHex,'stop-opacity':String(alphaTo)});
    const s2=mk('stop',{offset:'100%','stop-color':colorHex,'stop-opacity':String(alphaTo)});
    g.append(s1,s2);
    gDefs.append(g);
    return `url(#${id})`;
  }

  // 円弧パス（内半径 r1〜外半径 r2、a1°→a2°）
  function arcPath(r1,r2,a1,a2){
    const large=(a2-a1)>180?1:0;
    const p1=xy(r2,a1), p2=xy(r2,a2);
    const p3=xy(r1,a2), p4=xy(r1,a1);
    return `M${p1.x},${p1.y} A${r2},${r2} 0 ${large} 1 ${p2.x},${p2.y} L${p3.x},${p3.y} A${r1},${r1} 0 ${large} 0 ${p4.x},${p4.y} Z`;
  }

  let currentHi=null;
  function clearHiGrads(){
    [...gDefs.querySelectorAll('linearGradient[data-hi]')].forEach(n=>n.remove());
  }
  function makeHiGrad(oi,di,colorHex,alphaTo){
    const url=makeGrad(oi,di,colorHex,alphaTo);
    // 直近追加されたグラデーションにマーク
    gDefs.lastElementChild.setAttribute('data-hi','1');
    return url;
  }
  function highlight(i, keepDetail){
    currentHi=i;
    gHiFlow.innerHTML='';
    clearHiGrads();
    if(i===null){
      nodes.forEach(n=>{ n.g.classList.remove('dim','hilite'); });
      if(!keepDetail) showPlaceholder();
      return;
    }
    nodes.forEach((n,k)=>{
      if(k===i){ n.g.classList.add('hilite'); n.g.classList.remove('dim'); }
      else     { n.g.classList.add('dim');    n.g.classList.remove('hilite'); }
    });
    const year=YEARS[+slider.value];
    const yd=data.years[year];
    // 自分への流入と自分からの流出
    const ins=[], outs=[];
    yd.flows.forEach(([oi,di,v])=>{
      if(di===i && oi!==i) ins.push([oi,v]);
      if(oi===i && di!==i) outs.push([di,v]);
    });

    if(MODE==='net'){
      const inMap={}; ins.forEach(([o,v])=>inMap[o]=v);
      const outMap={}; outs.forEach(([d,v])=>outMap[d]=v);
      const others=new Set([...Object.keys(inMap),...Object.keys(outMap)].map(Number));
      const netIn=[], netOut=[];
      others.forEach(k=>{
        const a=outMap[k]||0, b=inMap[k]||0;
        if(a>b) netOut.push([k, a-b]);
        else if(b>a) netIn.push([k, b-a]);
      });
      const maxV=Math.max(...netIn.map(x=>x[1]),...netOut.map(x=>x[1]),1);
      netIn.forEach(([oi,v])=>{
        const r=v/maxV;
        const op=Math.max(.18, Math.pow(r,0.55));
        const stroke=makeHiGrad(oi,i,'#ff5b86',op);
        const el=mk('path',{class:'flow in anim fast',d:chord(oi,i)});
        el.style.stroke=stroke;
        el.style.strokeWidth=strokeW(v,maxV,0.6,12,1.0);
        gHiFlow.append(el);
        nodes[oi].g.classList.remove('dim');
      });
      netOut.forEach(([di,v])=>{
        const r=v/maxV;
        const op=Math.max(.18, Math.pow(r,0.55));
        const stroke=makeHiGrad(i,di,'#3ecbff',op);
        const el=mk('path',{class:'flow out anim fast',d:chord(i,di)});
        el.style.stroke=stroke;
        el.style.strokeWidth=strokeW(v,maxV,0.6,12,1.0);
        gHiFlow.append(el);
        nodes[di].g.classList.remove('dim');
      });
      showDetail(i, netIn, netOut, true);
    }
  }

  function updateDetail(){
    if(currentHi!==null) highlight(currentHi,true);
  }

  function showPlaceholder(){
    detailHost.innerHTML=`
      <div class="placeholder">都道府県をホバーすると<br>詳細が表示されます</div>`;
  }

  function showDetail(i, ins, outs, isNet){
    const year=YEARS[+slider.value];
    const yd=data.years[year];
    const name=PREFS[i];
    const inSum=yd.in[i], outSum=yd.out[i], net=yd.net[i];
    const reg=regionMerged[name]||REGION[name];
    const netCls=net>=0?'pos':'neg';
    const netStr=(net>=0?'+':'')+net.toLocaleString();
    const insSorted=[...ins].sort((a,b)=>b[1]-a[1]).slice(0,8);
    const outsSorted=[...outs].sort((a,b)=>b[1]-a[1]).slice(0,8);
    const mxIn=Math.max(...insSorted.map(x=>x[1]),1);
    const mxOut=Math.max(...outsSorted.map(x=>x[1]),1);
    const fmt=v=>(isNet&&v>0?'+':'')+v.toLocaleString();
    const li=insSorted.map(([oi,v])=>`<div class="flow-row"><div class="bar pos" style="width:${100*v/mxIn}%"></div><div class="content"><span>${PREFS[oi]} <span style="color:#888">→</span></span><span class="v">${fmt(v)}</span></div></div>`).join('');
    const lo=outsSorted.map(([di,v])=>`<div class="flow-row"><div class="bar neg" style="width:${100*v/mxOut}%"></div><div class="content"><span><span style="color:#888">→</span> ${PREFS[di]}</span><span class="v">${fmt(v)}</span></div></div>`).join('');
    detailHost.innerHTML=`
      <div class="stat-box">
        <div class="stat-name">${name}</div>
        <div class="stat-region">${reg}地方　${year}年</div>
        <div class="net-big ${netCls}">${netStr}</div>
        <div class="net-cap">${net>=0?'転入超過（純）':'転出超過（純）'}</div>
        <div class="io-row">
          <div class="io-cell"><div class="io-cap">総流入</div><div class="io-val pos">${inSum.toLocaleString()}</div></div>
          <div class="io-cell"><div class="io-cap">総流出</div><div class="io-val neg">${outSum.toLocaleString()}</div></div>
        </div>
      </div>
      <div class="flow-section">
        <h4 class="pos">流入元 TOP 8</h4>
        <div class="flow-list">${li||'<div style="padding:8px;color:#666;font-size:.7rem">該当なし</div>'}</div>
        <h4 class="neg">流出先 TOP 8</h4>
        <div class="flow-list">${lo||'<div style="padding:8px;color:#666;font-size:.7rem">該当なし</div>'}</div>
      </div>`;
  }

  // モード切替（UIは非表示、純流動のみ）
  // 以前のスイッチャーイベントは削除


  // ── スライダー ──
  slider.max=YEARS.length-1;
  slider.value=YEARS.length-1;
  slider.addEventListener('input',()=>{
    renderYear(YEARS[+slider.value]);
  });

  // ── 再生 ──
  let playing=false, timer=null;
  playBtn.addEventListener('click',()=>{
    playing=!playing;
    playBtn.classList.toggle('playing',playing);
    playBtn.textContent=playing?'■':'▶';
    if(playing){
      timer=setInterval(()=>{
        let v=+slider.value+1;
        if(v>=YEARS.length) v=0;
        slider.value=v;
        renderYear(YEARS[v]);
      },900);
    }else clearInterval(timer);
  });

  // 初期描画
  renderYear(YEARS[YEARS.length-1]);

  function mk(tag,attrs){
    const el=document.createElementNS(SVG_NS,tag);
    if(attrs) for(const k in attrs) el.setAttribute(k,attrs[k]);
    return el;
  }
})();
</script>
</body>
</html>
